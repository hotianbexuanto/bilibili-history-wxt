name: Build Extension

on:
  push:
  pull_request:

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm compile

      - name: Build Chrome extension
        run: pnpm build

      - name: Build Edge extension
        run: pnpm build -b edge

      - name: Build Firefox extension
        run: pnpm build:firefox

      - name: Package Chrome extension
        run: pnpm zip

      - name: Package Edge extension
        run: pnpm zip -b edge

      - name: Package Firefox extension
        run: pnpm zip:firefox

      - name: Collect build artifacts
        id: artifacts
        shell: bash
        run: |
          mapfile -t ARTIFACT_FILES < <(find .output -type f \( -name '*.zip' -o -name 'manifest.json' \) | sort)

          if [ ${#ARTIFACT_FILES[@]} -eq 0 ]; then
            echo "No build artifacts found in .output" >&2
            find .output -maxdepth 3 -type f | sort || true
            exit 1
          fi

          {
            echo 'files<<EOF'
            printf '%s\n' "${ARTIFACT_FILES[@]}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: extension-build-artifacts
          path: ${{ steps.artifacts.outputs.files }}
          if-no-files-found: error
